name: Record gain-loss history

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update history
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/update_gain_loss_history.py
      - name: Commit history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gain-loss-history.js
          git diff --cached --quiet || git commit -m "Update gain-loss history"
          git push
