<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>股票投资组合追踪器 V2 - 分批买卖</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <h1>股票投资组合追踪器 V2</h1>

        <div class="input-row">
            <select id="actionInput">
                <option value="buy">买入 / 增加</option>
                <option value="sell">卖出 / 减少</option>
            </select>

            <input id="symbolInput" placeholder="股票代码，例如 AAPL">
            <input id="sharesInput" type="number" min="0" step="any" placeholder="股数">
            <input id="priceInput" type="number" min="0" step="any" placeholder="交易价格">
            <button id="addButton">新增交易</button>
        </div>

        <div class="note">
            买入会增加持股和成本；卖出会减少持股，并按平均成本减少成本基础。
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>股票代码</th>
                        <th>持股数量</th>
                        <th>平均成本</th>
                        <th>最新价格</th>
                        <th>市值</th>
                        <th>总成本</th>
                        <th>盈亏</th>
                        <th>盈亏百分比</th>
                        <th>今日价格范围</th>
                        <th>操作</th>
                    </tr>
                </thead>

                <tbody id="portfolioBody"></tbody>

                <tfoot>
                    <tr>
                        <th colspan="5">总盈亏</th>
                        <th id="totalCostCell">$0.00</th>
                        <th id="totalGainCell">$0.00</th>
                        <th id="totalGainPercentCell">0.00%</th>
                        <th colspan="2"></th>
                    </tr>
                </tfoot>
            </table>
        </div>

        <h2>投资组合盈亏图</h2>
        <div id="chartSummary" class="chart-summary">总投入：$0.00</div>
        <div class="chart-box">
            <canvas id="portfolioChart"></canvas>
        </div>

        <h2>交易记录</h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>日期时间</th>
                        <th>操作</th>
                        <th>股票代码</th>
                        <th>股数</th>
                        <th>交易价格</th>
                        <th>交易金额</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="transactionBody"></tbody>
            </table>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
