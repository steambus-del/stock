<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>股票投资组合</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <h1>股票投资组合</h1>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th><button class="sort-header" data-sort-key="symbol">股票代码</button></th>
                        <th><button class="sort-header" data-sort-key="shares">持股数量</button></th>
                        <th><button class="sort-header" data-sort-key="avgCost">平均成本</button></th>
                        <th><button class="sort-header" data-sort-key="currentPrice">最新价格</button></th>
                        <th><button class="sort-header" data-sort-key="dailyChange">每日价格变动</button></th>
                        <th><button class="sort-header" data-sort-key="marketValue">市值</button></th>
                        <th><button class="sort-header" data-sort-key="costBasis">总成本</button></th>
                        <th><button class="sort-header" data-sort-key="gainLoss">盈亏</button></th>
                        <th><button class="sort-header" data-sort-key="gainPercent">盈亏百分比</button></th>
                        <th>今日价格范围</th>
                        <th><button class="sort-header" data-sort-key="earningsSort">财报日期</button></th>
                    </tr>
                </thead>

                <tbody id="portfolioBody"></tbody>

                <tfoot>
                    <tr>
                        <th colspan="5">总盈亏</th>
                        <th id="totalValueCell">$0.00</th>
                        <th id="totalCostCell">$0.00</th>
                        <th id="totalGainCell">$0.00</th>
                        <th id="totalGainPercentCell">0.00%</th>
                        <th></th>
                        <th></th>
                    </tr>
                </tfoot>
            </table>
        </div>

        <h2>投资盈亏图</h2>
        <div id="chartSummary" class="chart-summary">总投入：$0.00</div>
        <div class="chart-controls">
            <label for="chartSortSelect">图表排序：</label>
            <select id="chartSortSelect">
                <option value="symbol:asc">股票代码 A-Z</option>
                <option value="gainLoss:desc" selected>盈亏 高到低</option>
                <option value="gainLoss:asc">盈亏 低到高</option>
                <option value="gainPercent:desc">盈亏百分比 高到低</option>
                <option value="gainPercent:asc">盈亏百分比 低到高</option>
                <option value="marketValue:desc">市值 高到低</option>
                <option value="marketValue:asc">市值 低到高</option>
                <option value="dailyChange:desc">每日价格变动 高到低</option>
                <option value="dailyChange:asc">每日价格变动 低到高</option>
            </select>
        </div>
        <div class="chart-box">
            <canvas id="portfolioChart"></canvas>
        </div>

        <h2>每日投资盈亏</h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>当日变动</th>
                        <th>当日变动百分比</th>
                        <th>当日总未实现盈亏</th>
                        <th>对比前一日总未实现盈亏</th>
                        <th>说明</th>
                    </tr>
                </thead>

                <tbody id="dailyMovementBody"></tbody>
            </table>
        </div>

        <div class="pager">
            <button id="dailyPrevButton">上一页</button>
            <span id="dailyPageInfo">第 1 页</span>
            <button id="dailyNextButton">下一页</button>
        </div>

        <h2>买卖记录</h2>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>操作</th>
                        <th>股票代码</th>
                        <th>股数</th>
                        <th>交易价格</th>
                        <th>交易金额</th>
                    </tr>
                </thead>

                <tbody id="transactionBody"></tbody>
            </table>
        </div>

        <div class="pager">
            <button id="txPrevButton">上一页</button>
            <span id="txPageInfo">第 1 页</span>
            <button id="txNextButton">下一页</button>
        </div>
    </div>

    <script src="./portfolio-data.js"></script>
    <script src="./daily-history.js"></script>
    <script src="./app.js"></script>
</body>
</html>
