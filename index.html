<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>股票投资组合</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="container">
  <h1>股票投资组合</h1>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th><button class="sort-header" data-sort-key="symbol">股票代码</button></th>
          <th><button class="sort-header" data-sort-key="shares">持股数量</button></th>
          <th><button class="sort-header" data-sort-key="avgCost">平均成本</button></th>
          <th><button class="sort-header" data-sort-key="currentPrice">最新价格</button></th>
          <th><button class="sort-header" data-sort-key="dailyChangePercent">每日价格变动</button></th>
          <th><button class="sort-header" data-sort-key="dailyStockGain">个股今日盈亏</button></th>
          <th><button class="sort-header" data-sort-key="marketValue">市值</button></th>
          <th><button class="sort-header" data-sort-key="costBasis">总成本</button></th>
          <th><button class="sort-header" data-sort-key="gainLoss">盈亏</button></th>
          <th><button class="sort-header" data-sort-key="gainPercent">盈亏百分比</button></th>
          <th>今日价格范围</th>
        </tr>
      </thead>
      <tbody id="portfolioBody"></tbody>
      <tfoot>
        <tr>
          <th colspan="5">总盈亏</th>
          <th id="totalValueCell">$0.00</th>
          <th id="totalCostCell">$0.00</th>
          <th id="totalGainCell">$0.00</th>
          <th id="totalGainPercentCell">0.00%</th>
          <th id="totalDailyStockGainCell">$0.00</th>
          <th></th>
        </tr>
      </tfoot>
    </table>
  </div>

  <h2>投资盈亏图</h2>
  <div id="chartSummary" class="chart-summary">总投入：$0.00</div>
  <div class="chart-controls">
    <label for="chartSortSelect">图表排序：</label>
    <select id="chartSortSelect">
      <option value="gainLoss:desc" selected>盈亏 高到低</option>
      <option value="gainLoss:asc">盈亏 低到高</option>
      <option value="gainPercent:desc">盈亏百分比 高到低</option>
      <option value="gainPercent:asc">盈亏百分比 低到高</option>
      <option value="marketValue:desc">市值 高到低</option>
      <option value="marketValue:asc">市值 低到高</option>
      <option value="dailyChange:desc">每日价格变动 高到低</option>
      <option value="dailyChange:asc">每日价格变动 低到高</option>
      <option value="symbol:asc">股票代码 A-Z</option>
    </select>
  </div>
  <div class="chart-box"><canvas id="portfolioChart"></canvas></div>

  <div class="allocation-history-grid">
  <section class="dashboard-panel history-panel">
    <div class="history-heading-row">
      <h2>盈亏历史</h2>
    </div>
    <div class="table-wrap">
      <table class="history-table">
        <thead><tr><th>日期</th><th>盈利 / 亏损</th><th>每日盈亏</th></tr></thead>
        <tbody id="gainLossHistoryBody"></tbody>
      </table>
    </div>
    <div class="pager">
      <button id="historyPrevButton">上一页</button>
      <span id="historyPageInfo">第 1 页</span>
      <button id="historyNextButton">下一页</button>
    </div>
  </section>

  <section class="dashboard-panel">
    <h2>股票持仓占比</h2>
    <div class="pie-chart-box"><canvas id="ownershipPieChart"></canvas></div>
  </section>
</div>

<h2>暴富笔记</h2>
  <div class="table-wrap">
    <table class="comments-table"><colgroup><col class="date-col"><col></colgroup>
      <thead>
        <tr>
          <th>日期</th>
          <th>暴富笔记</th>
        </tr>
      </thead>
      <tbody id="commentsBody"></tbody>
    </table>
  </div>
  <div class="pager">
    <button id="commentsPrevButton">上一页</button>
    <span id="commentsPageInfo">第 1 页</span>
    <button id="commentsNextButton">下一页</button>
  </div>


<h2>利润</h2>
<div class="table-wrap">
  <table class="profits-table">
    <thead><tr>
      <th>卖出日期</th><th>股票代码</th><th>成本价</th><th>卖出价格</th>
      <th>卖出股数</th><th>本次盈亏</th><th>累计已实现盈亏</th>
    </tr></thead>
    <tbody id="profitsBody"></tbody>
  </table>
</div>
  <div class="pager">
    <button id="profitsPrevButton">上一页</button>
    <span id="profitsPageInfo">第 1 页</span>
    <button id="profitsNextButton">下一页</button>
  </div>

<h2>买卖记录</h2>
  <div class="table-wrap">
    <table>
      <thead><tr><th>日期</th><th>操作</th><th>股票代码</th><th>股数</th><th>交易价格</th><th>交易金额</th></tr></thead>
      <tbody id="transactionBody"></tbody>
    </table>
  </div>
  <div class="pager"><button id="txPrevButton">上一页</button><span id="txPageInfo">第 1 页</span><button id="txNextButton">下一页</button></div><div id="historyDialog" class="history-dialog-overlay" hidden>
    <div class="history-dialog" role="dialog" aria-modal="true" aria-labelledby="historyDialogTitle">
      <h3 id="historyDialogTitle">添加盈亏历史</h3>

      <label for="historyDateInput">日期</label>
      <input id="historyDateInput" type="date">

      <label for="historyGainLossInput">盈利 / 亏损</label>
      <input id="historyGainLossInput" type="number" step="0.01" placeholder="例如：523.42 或 -186.35">

      <div id="historyFormError" class="history-form-error"></div>

      <div class="history-dialog-actions">
        <button id="saveHistoryButton" class="history-save-button">保存</button>
        <button id="cancelHistoryButton" class="history-cancel-button">取消</button>
      </div>
    </div>
  </div>

</div>

<script src="./portfolio-data.js"></script>
<script src="./gain-loss-history.js"></script>
<script src="./comments.js"></script>
<script src="./app.js"></script>
</body>
</html>
