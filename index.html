<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>公开股票投资组合</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <h1>公开股票投资组合</h1>
        <div class="note">
            这是公开只读版本。访客可以查看投资组合，但不能修改。要更新持仓，请编辑 <b>portfolio-data.js</b> 后重新上传到 GitHub。
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>股票代码</th>
                        <th>持股数量</th>
                        <th>平均成本</th>
                        <th>最新价格</th>
                        <th>市值</th>
                        <th>总成本</th>
                        <th>盈亏</th>
                        <th>盈亏百分比</th>
                        <th>今日价格范围</th>
                    </tr>
                </thead>

                <tbody id="portfolioBody"></tbody>

                <tfoot>
                    <tr>
                        <th colspan="5">总盈亏</th>
                        <th id="totalCostCell">$0.00</th>
                        <th id="totalGainCell">$0.00</th>
                        <th id="totalGainPercentCell">0.00%</th>
                        <th></th>
                    </tr>
                </tfoot>
            </table>
        </div>

        <h2>投资组合盈亏图</h2>
        <div id="chartSummary" class="chart-summary">总投入：$0.00</div>
        <div class="chart-box">
            <canvas id="portfolioChart"></canvas>
        </div>

        <h2>交易记录</h2>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>操作</th>
                        <th>股票代码</th>
                        <th>股数</th>
                        <th>交易价格</th>
                        <th>交易金额</th>
                    </tr>
                </thead>
                <tbody id="transactionBody"></tbody>
            </table>
        </div>
    </div>

    <script src="./portfolio-data.js"></script>
    <script src="./app.js"></script>
</body>
</html>
